events {}

http {
    lua_shared_dict rate_limit_store 10m;

    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'req_body="$request_body"';

    access_log /var/log/nginx/access.log detailed;

    server {
        listen 80 default_server;
        server_name _;

        location / {
            content_by_lua_block {
                local dict = ngx.shared.rate_limit_store
                local key = ngx.var.binary_remote_addr

                local limit = 20
                local window = 60

                local current = dict:get(key)

                if not current then
                    dict:set(key, 1, window)
                    current = 1
                else
                    current = dict:incr(key, 1)
                end

                local remaining = limit - current
                if remaining < 0 then remaining = 0 end

                local ttl = dict:ttl(key)
                if ttl < 0 then ttl = window end

                ngx.header["Content-Type"] = "application/json"
                ngx.header["X-RateLimit-Limit"] = limit
                ngx.header["X-RateLimit-Remaining"] = remaining
                ngx.header["X-RateLimit-Reset"] = ttl

                if current > limit then
                    ngx.status = 429
                    ngx.say('{"error":"rate limit exceeded"}')
                    return ngx.exit(429)
                end

                ngx.say('{"item":{"hashed_id":"abc123def456","name":"Bow","description":"A sturdy bow made from ancient wood","image_url":"https://cdn.idle-mmo.com/images/bow.png","type":"WEAPON","quality":"STANDARD","vendor_price":100,"is_tradeable":true,"max_tier":5,"requirements":{"level":10,"strength":15},"stats":{"damage":10,"accuracy":5},"effects":[{"attribute":"experience","target":"dungeon","value":5,"value_type":"percentage"}],"tier_modifiers":{"2":1.2,"3":1.4,"4":1.6,"5":1.8},"upgrade_requirements":[{"item_id":123,"quantity":2}],"health_restore":null,"hunger_restore":null,"recipe":{"skill":"Crafting","level_required":10,"max_uses":5,"experience":{"skills":{"forge":500},"stats":{"strength":20}},"materials":[{"hashed_item_id":"xyz789abc123","item_name":"Oak Wood","quantity":3}],"result":{"hashed_item_id":"result123","item_name":"Refined Bow"}},"chest_drops":[{"hashed_item_id":"l43p249","item_name":"Coin","quantity":100,"chance":25.5},{"hashed_item_id":"hj324lu2","item_name":"Gem","quantity":1,"chance":5}],"pet":{"id":15,"hashed_id":"pet789xyz","name":"Fire Dragon","description":"A majestic dragon with blazing scales","image_url":"https://cdn.idle-mmo.com/images/pets/fire-dragon.png"},"where_to_find":{"enemies":[{"id":123,"name":"Goblin","level":8}],"dungeons":[{"id":456,"name":"Vineyard Labyrinth"}],"world_bosses":[{"id":789,"name":"Isadora"}]}},"endpoint_updates_at":"2025-12-21T13:30:00.000000Z"}')
            }
        }
    }
}